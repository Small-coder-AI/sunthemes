name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if ($tag -ne $ver) {
            Write-Error "Tag '$tag' != pyproject version '$ver' — bump versions before tagging"
            exit 1
          }
          "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build standalone exe (PyInstaller)
        run: uv run pyinstaller sunthemes.spec --noconfirm

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$env:APP_VERSION installer.iss

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/SunthemesSetup.exe
